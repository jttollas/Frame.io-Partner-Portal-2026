      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }

      25% { transform: translate(80px, -60px) scale(1.1); }
      50% { transform: translate(-40px, 40px) scale(0.95); }

      25% { transform: translate(-60px, 40px) scale(1.05); }
      50% { transform: translate(50px, -30px) scale(1.1); }
      75% { transform: translate(-30px, -50px) scale(0.95); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(75,142,247,0.1); }
      50% { box-shadow: 0 0 40px rgba(75,142,247,0.2); }

    @keyframes float {
      0%, 100% { transform: translateY(0); }

    @keyframes borderGlow {
      0%, 100% { border-color: rgba(75,142,247,0.2); }

    // ─── CUSTOMIZABLE KPI ROW COMPONENT ─────────────────────────────
    function KpiRow({allMetrics, defaultIds, scale=1}) {
      const [selected, setSelected] = useState(defaultIds);
      const [editing, setEditing] = useState(false);
      const maxKpis = 7;

      const swap = (i, dir) => {
        const j = i + dir;
        if (j < 0 || j >= selected.length) return;
        const arr = [...selected];
        [arr[i], arr[j]] = [arr[j], arr[i]];
        setSelected(arr);
      };

      const change = (i, newId) => {
        const arr = [...selected];
        arr[i] = newId;
        setSelected(arr);
      };

      const visibleSelected = selected.slice(0, maxKpis);
      const metrics = visibleSelected.map(id => allMetrics.find(m => m.id === id)).filter(Boolean);

      return (
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',marginBottom:8,gap:8}}>
              <button onClick={()=>setEditing(!editing)}
                style={{background:'none',border:'1px solid var(--border)',color:editing?'var(--accent)':'var(--muted)',padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'all 0.2s'}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--text)'}
                onMouseLeave={e=>e.currentTarget.style.color=editing?'var(--accent)':'var(--muted)'}>
                {editing ? <><Check size={12}/> Done</> : <><Pencil size={12}/> Customize</>}
              </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12}}>
            {metrics.map((kpi, i) => (
              <Card key={kpi.id+i} hover={false} style={{padding:editing?'12px':'20px 24px',position:'relative',border:editing?'1px dashed var(--accent)':'1px solid rgba(255,255,255,0.05)',borderTop:editing?undefined:'3px solid '+kpi.color,background:editing?'var(--surface)':`linear-gradient(180deg, ${kpi.color}08, var(--surface))`,boxShadow:'none'}}>
                {editing && (
                  <div style={{marginBottom:8}}>
                    <select value={kpi.id} onChange={e=>change(i,e.target.value)}
                      style={{width:'100%',padding:'4px 6px',background:'var(--surface2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:4,fontSize:11,outline:'none'}}>
                      {allMetrics.map(m => (
                        <option key={m.id} value={m.id} disabled={selected.includes(m.id) && m.id !== kpi.id}>{m.label}</option>
                      ))}
                    </select>
                    <div style={{display:'flex',gap:4,marginTop:4}}>
                      <button onClick={()=>swap(i,-1)} disabled={i===0}
                        style={{flex:1,padding:'2px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:3,color:i===0?'var(--border)':'var(--muted)',fontSize:10,cursor:i===0?'default':'pointer'}}>◀</button>
                      <button onClick={()=>swap(i,1)} disabled={i===metrics.length-1}
                        style={{flex:1,padding:'2px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:3,color:i===metrics.length-1?'var(--border)':'var(--muted)',fontSize:10,cursor:i===metrics.length-1?'default':'pointer'}}>▶</button>
                    </div>
                  </div>

                          <thead><tr style={{borderBottom:'1px solid var(--border)'}}><th style={{textAlign:'left',padding:'6px 0',color:'var(--muted)',fontWeight:600}}>SCOPE</th><th style={{textAlign:'left',padding:'6px 0',color:'var(--muted)',fontWeight:600}}>DESCRIPTION</th></tr></thead>
                          <tbody>
                            {[['openid','Sign in a user'],['offline_access','Maintain access to consented data'],['additional_info.roles','Adobe Commerce Admin'],['email','Read the user\'s email address'],['profile','Read the user\'s basic profile information']].map(([s,d])=>(
                              <tr key={s} style={{borderBottom:'1px solid var(--border)'}}><td style={{padding:'8px 0'}}><code>{s}</code></td><td style={{padding:'8px 0',color:'var(--muted)'}}>{d}</td></tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* Step 4b: OAuth Type Selection (User Auth) */}
                {createStep===4 && newProject.authType==='user' && (
                  <div>
                    <h3 style={{fontFamily:'DM Sans',fontWeight:700,fontSize:18,marginBottom:4}}>Add a user authentication credential</h3>
                    <p style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>User authentication allows you to authenticate an Adobe user to call Adobe APIs on their behalf.</p>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                      {[
                        {key:'webapp',label:'OAuth Web App',desc:'Compatible with applications that have a frontend UI and a backend server. The server is responsible for storing client secrets securely and fetching access tokens.'},
                        {key:'spa',label:'OAuth Single-Page App',desc:'Compatible with web applications running in a browser without a backend server. The web application is responsible for fetching access tokens.'},
                      ].map(opt => (
                        <div key={opt.key} onClick={()=>setNewProject({...newProject,oauthType:opt.key})}
                          style={{border:newProject.oauthType===opt.key?'2px solid var(--accent)':'1px solid var(--border)',borderRadius:12,padding:20,cursor:'pointer',position:'relative',background:newProject.oauthType===opt.key?'rgba(59,130,246,0.05)':'var(--surface)'}}>
                          {newProject.oauthType===opt.key && <div style={{position:'absolute',top:12,right:12}}><CheckCircle2 size={18} color="var(--accent)"/></div>}
                          <p style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>USER AUTHENTICATION</p>
                          <h4 style={{fontFamily:'DM Sans',fontWeight:600,fontSize:15,marginBottom:8}}>{opt.label}</h4>
                          <p style={{color:'var(--muted)',fontSize:12,lineHeight:1.5}}>{opt.desc}</p>
                        </div>
                      ))}
                    </div>
                    <div onClick={()=>setNewProject({...newProject,oauthType:'native'})}
                      style={{border:newProject.oauthType==='native'?'2px solid var(--accent)':'1px solid var(--border)',borderRadius:12,padding:20,cursor:'pointer',position:'relative',marginTop:16,maxWidth:'calc(50% - 8px)',background:newProject.oauthType==='native'?'rgba(59,130,246,0.05)':'var(--surface)'}}>
                      {newProject.oauthType==='native' && <div style={{position:'absolute',top:12,right:12}}><CheckCircle2 size={18} color="var(--accent)"/></div>}
                      <p style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>USER AUTHENTICATION</p>
                      <h4 style={{fontFamily:'DM Sans',fontWeight:600,fontSize:15,marginBottom:8}}>OAuth Native App</h4>
                      <p style={{color:'var(--muted)',fontSize:12,lineHeight:1.5}}>Compatible with mobile or desktop applications that run natively on a device and do not have a backend server.</p>
                    </div>
                  </div>
                )}

                {/* Step 5: Configure OAuth Credential (User Auth only) */}
                {createStep===5 && (
                  <div>
                    <div style={{display:'flex',gap:32}}>
                      <div style={{width:180,flexShrink:0,borderRight:'1px solid var(--border)',paddingRight:24}}>
                        <p style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',marginBottom:8}}>API</p>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                          <span style={{fontSize:14,fontWeight:800,letterSpacing:-1}}>)))</span>
                          <span style={{fontSize:13,fontWeight:500}}>Frame.io API</span>
                        </div>
                        <p style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>Credentials</p>
                        <p style={{fontSize:13}}>OAuth 2.0</p>
                        <p style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase'}}>{newProject.oauthType==='webapp'?'WEBAPP':newProject.oauthType==='spa'?'SPA':'NATIVE'}</p>
                      </div>
                      <div style={{flex:1}}>
                        <h3 style={{fontFamily:'DM Sans',fontWeight:700,fontSize:18,marginBottom:4}}>Configure OAuth {newProject.oauthType==='webapp'?'Web App':newProject.oauthType==='spa'?'Single-Page App':'Native App'} credential</h3>
                        <p style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>Add the default redirect URI and redirect URI pattern below.</p>
                        <div style={{marginBottom:16}}>
                          <label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:4}}>Default redirect URI *</label>
                          <input value={newProject.redirectUri} onChange={e=>setNewProject({...newProject,redirectUri:e.target.value})} placeholder="https://myapp.example.com/callback"
                            style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:14,outline:'none'}}/>
                          <p style={{fontSize:11,color:'var(--muted)',marginTop:4}}>The URI must be hosted on a secure (HTTPS) server, even if it is only a localhost instance.</p>
                        </div>
                        <div style={{marginBottom:20}}>
                          <label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:4}}>Redirect URI pattern *</label>
                          <textarea value={newProject.redirectPattern} onChange={e=>setNewProject({...newProject,redirectPattern:e.target.value})} placeholder="https://myapp\\.example\\.com/callback" rows={2}
                            style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:14,outline:'none',resize:'vertical'}}/>
                          <p style={{fontSize:11,color:'var(--muted)',marginTop:4}}>You must escape periods (.) with \\ (https://example\\.com/)</p>
                        </div>
                        <h4 style={{fontFamily:'DM Sans',fontWeight:600,fontSize:14,marginBottom:8}}>Available Scopes</h4>
                        <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>All Scopes are currently available by default and can't be deselected at this time.</p>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                          <thead><tr style={{borderBottom:'1px solid var(--border)'}}><th style={{textAlign:'left',padding:'6px 0',color:'var(--muted)',fontWeight:600}}>SCOPE</th><th style={{textAlign:'left',padding:'6px 0',color:'var(--muted)',fontWeight:600}}>END-USER DESCRIPTION</th></tr></thead>
                          <tbody>
                            {[['openid','Sign in a user'],['offline_access','Maintain access to the data the user had consented to'],['additional_info.roles','Adobe Commerce Admin'],['email','Read the user\'s email address'],['profile','Read the user\'s basic profile information']].map(([s,d])=>(
                              <tr key={s} style={{borderBottom:'1px solid var(--border)'}}><td style={{padding:'8px 0'}}><code>{s}</code></td><td style={{padding:'8px 0',color:'var(--muted)'}}>{d}</td></tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* Step 6: Summary */}
                {createStep===6 && (
                  <div style={{textAlign:'center',position:'relative',padding:'20px 0'}}>
                    <Confetti/>
                    <div style={{width:64,height:64,borderRadius:99,background:'rgba(34,197,94,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                      <CheckCircle2 size={32} color="var(--green)"/>
                    </div>
                    <h3 style={{fontFamily:'DM Sans',fontWeight:700,fontSize:22,marginBottom:8}}>Project Created!</h3>
                    <p style={{color:'var(--muted)',fontSize:14,marginBottom:24}}>Your Frame.io API project is ready.</p>
                    <div style={{background:'var(--surface2)',borderRadius:10,padding:20,textAlign:'left',maxWidth:400,margin:'0 auto 24px'}}>
                      {[
                        ['Project',newProject.name],
                        ['Environment',newProject.env],
                        ['API','Frame.io API'],
                        ['Auth Type',newProject.authType==='s2s'?'Server-to-Server':'User Auth ('+newProject.oauthType+')'],
                        ['Client ID','fio_c_'+Math.random().toString(36).slice(2,14)],
                        ...(newProject.authType==='user'&&newProject.redirectUri?[['Redirect URI',newProject.redirectUri]]:[]),
                      ].map(([k,v])=>(
                        <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                          <span style={{color:'var(--muted)',fontSize:13}}>{k}</span>
                          <span style={{fontSize:13,fontWeight:500,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</span>
                        </div>
                      ))}
                    </div>
                    <Btn onClick={()=>{
                      const id='proj-'+Date.now();
                      const projName = newProject.name.trim() || 'New Integration';
                      setProjects([...projects,{id,name:projName,env:newProject.env,type:newProject.type,authType:newProject.authType,oauthType:newProject.oauthType,clientId:(newProject.type==='c2c'?'fio_c2c_':'fio_c_')+Math.random().toString(36).slice(2,14),clientSecret:(newProject.type==='c2c'?'fio_c2c_secret_':'fio_secret_')+Math.random().toString(36).slice(2,22),redirectUri:newProject.redirectUri,redirectPattern:newProject.redirectPattern,scopes:newProject.scopes,createdAt:new Date().toISOString().split('T')[0]}]);
                      // Add to breakdown data so it appears in the dropdown and tables
                      if (newProject.type === 'c2c') {
                        setDeviceModels(prev => [...prev, { model: projName, accounts: 0, devices: 0, assets: 0, runtime: 0, storage: 0, lightroom: 0, projectId: id }]);
                      } else {
                        setPlatformBreakdown(prev => [...prev, { name: projName, projectId: id, apiCalls: 0, assets: 0, comments: 0, shares: 0, webhookDeliveries: 0, errorRate: 0, avgLatency: 0 }]);
                      }
                      setDashIntegration([id]);
                      setShowCreateProject(false);
                    }}>View Dashboard</Btn>
                  </div>
                )}

                {/* Navigation buttons */}
                {createStep<6 && (
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:28}}>
                    <Btn variant="ghost" onClick={()=>{
                      if(createStep===1) setShowCreateProject(false);
                      else if(createStep===5 && newProject.authType==='user') setCreateStep(4);
                      else setCreateStep(createStep-1);
                    }}>{createStep===1?'Cancel':'Back'}</Btn>
                    <Btn onClick={()=>{
                      if(createStep===4 && newProject.authType==='s2s') setCreateStep(6);
                      else if(createStep===4 && newProject.authType==='user') setCreateStep(5);
                      else setCreateStep(createStep+1);
                    }} disabled={
                      (createStep===1 && !newProject.name.trim()) ||
                      (createStep===3 && !newProject.authType)
                    }>{createStep===4&&newProject.authType==='s2s'?'Save configured API':'Next'} <ArrowRight size={16}/></Btn>
                  </div>
                )}
              </div>
            </Modal>
          )}

          {/* C2C Client Secret Request Modal */}
          {showC2CRequestModal && (
            <Modal onClose={()=>setShowC2CRequestModal(false)} width={560}>
              <div style={{padding:32}}>
                {!c2cRequestSubmitted ? (
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                      <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg, #0bc5ea 0%, #3b82f6 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <Key size={20} color="#fff"/>
                      </div>
                      <div>
                        <h3 style={{fontFamily:'DM Serif Display',fontSize:20,margin:0}}>Request C2C Client Secret</h3>
                        <p style={{color:'var(--muted)',fontSize:12,margin:0}}>Submit a request to the Frame.io Partnerships team</p>
                      </div>
                    </div>

                    <div style={{background:'var(--surface2)',borderRadius:8,padding:12,marginBottom:24,marginTop:16,border:'1px solid var(--border)'}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <Info size={14} style={{color:'var(--accent)'}}/>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--accent)'}}>How it works</span>
                      </div>
                      <p style={{fontSize:12,color:'var(--muted)',margin:0,lineHeight:1.5}}>C2C integrations require an approved partnership. Your request will be reviewed by the Partnerships team, and you'll receive your client credentials via email once approved.</p>
                    </div>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
                      <div>
                        <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>First Name</label>
                        <input value={c2cRequestForm.firstName} onChange={e=>setC2CRequestForm(f=>({...f,firstName:e.target.value}))}
                          style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
                      </div>
                      <div>
                        <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Last Name</label>
                        <input value={c2cRequestForm.lastName} onChange={e=>setC2CRequestForm(f=>({...f,lastName:e.target.value}))}
                          style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
                      <div>
                        <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Company Name</label>
                        <input value={c2cRequestForm.company} onChange={e=>setC2CRequestForm(f=>({...f,company:e.target.value}))}
                          style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
                      </div>
                      <div>
                        <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Requestor Email</label>
                        <input value={c2cRequestForm.email} onChange={e=>setC2CRequestForm(f=>({...f,email:e.target.value}))}
                          style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
                      </div>
                    </div>
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Integration Name *</label>
                      <input value={c2cRequestForm.integrationName} onChange={e=>setC2CRequestForm(f=>({...f,integrationName:e.target.value}))} placeholder="e.g. Acme Camera C2C Upload"
                        style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
                    </div>
                    <div style={{marginBottom:24}}>
                      <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',display:'block',marginBottom:6}}>Integration Description *</label>
                      <textarea value={c2cRequestForm.description} onChange={e=>setC2CRequestForm(f=>({...f,description:e.target.value}))} placeholder="Briefly describe your C2C integration, target devices, and expected upload volume..."
                        rows={4} style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',resize:'vertical',fontFamily:'DM Sans',boxSizing:'border-box'}}/>
                    </div>

                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <Btn variant="ghost" onClick={()=>setShowC2CRequestModal(false)}>Cancel</Btn>
                      <Btn disabled={!c2cRequestForm.integrationName.trim()||!c2cRequestForm.description.trim()} onClick={()=>setC2CRequestSubmitted(true)}>Submit Request</Btn>
                    </div>
                  </div>
                ) : (
                  <div style={{textAlign:'center',padding:'16px 0'}}>
                    <div style={{width:56,height:56,borderRadius:99,background:'rgba(34,197,94,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                      <CheckCircle size={28} style={{color:'var(--green)'}}/>
                    </div>
                    <h3 style={{fontFamily:'DM Serif Display',fontSize:22,margin:'0 0 8px'}}>Request Submitted</h3>
                    <p style={{color:'var(--muted)',fontSize:14,maxWidth:380,margin:'0 auto 24px'}}>Your C2C client secret request has been sent to the Frame.io Partnerships team. You'll receive your credentials at <strong style={{color:'var(--text)'}}>{c2cRequestForm.email}</strong> once approved.</p>
                    <div style={{background:'var(--surface2)',borderRadius:10,padding:20,textAlign:'left',maxWidth:400,margin:'0 auto 24px'}}>
                      {[
                        ['Integration',c2cRequestForm.integrationName],
                        ['Requestor',c2cRequestForm.firstName+' '+c2cRequestForm.lastName],
                        ['Company',c2cRequestForm.company],
                        ['Email',c2cRequestForm.email],
                      ].map(([k,v])=>(
                        <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                          <span style={{color:'var(--muted)',fontSize:13}}>{k}</span>
                          <span style={{fontSize:13,fontWeight:500}}>{v}</span>
                        </div>
                      ))}
                    </div>
                    <Btn onClick={()=>setShowC2CRequestModal(false)}>Done</Btn>
                  </div>
                )}
              </div>
            </Modal>
          )}

          {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
        </div>
      );

      // ─── MAIN PORTAL VIEW ──────────────────────────────────────
      return (
        <div style={{minHeight:'100vh',background:'var(--bg)'}}>
          {/* Top Nav */}
          <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(6,8,16,0.82)',backdropFilter:'blur(20px) saturate(1.4)',borderBottom:'1px solid rgba(255,255,255,0.06)',padding:'0 32px',height:60,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:24,fontWeight:800,letterSpacing:-1,background:'linear-gradient(135deg,#4b8ef7,#0bc5ea)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>)))</span>
              <span style={{fontWeight:600,fontSize:15,letterSpacing:'-0.01em'}}>Platform</span>
              <ChevronDown size={14} style={{color:'var(--muted)'}}/>
              <span style={{fontSize:11,color:'var(--accent)',marginLeft:8,padding:'3px 10px',border:'1px solid rgba(75,142,247,0.25)',borderRadius:6,background:'rgba(75,142,247,0.08)',fontWeight:600,letterSpacing:'0.5px'}}>V4</span>
            </div>

            <div style={{display:'flex',alignItems:'center',gap:2}}>
              {[['home','Home'],['docs','Docs'],['api-reference','API Reference'],['changelog','Changelog']].map(([key,label]) => (
                <button key={key} onClick={()=>setActiveSection(key)}
                  style={{padding:'6px 14px',fontSize:13,fontWeight:500,border:'none',background:activeSection===key?'var(--surface)':'none',color:activeSection===key?'var(--text)':'var(--muted)',cursor:'pointer',borderRadius:6,transition:'all 0.2s'}}>
                  {label}
                </button>
              ))}
              <div style={{position:'relative'}}>
                <button onClick={()=>setDevToolsOpen(devToolsOpen==='resources'?false:'resources')}
                  style={{padding:'6px 14px',fontSize:13,fontWeight:500,border:'none',background:['partners','integrations','academy','portal'].includes(activeSection)?'var(--surface)':'none',
                    color:['partners','integrations','academy','portal'].includes(activeSection)?'var(--text)':'var(--muted)',cursor:'pointer',borderRadius:6,display:'flex',alignItems:'center',gap:4}}>
                  Resources <ChevronDown size={12}/>
                </button>
                {devToolsOpen==='resources' && (
                  <div style={{position:'absolute',top:'100%',left:0,marginTop:8,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:4,minWidth:200,boxShadow:'0 8px 32px rgba(0,0,0,0.5)',zIndex:60,animation:'slideDown 0.15s cubic-bezier(0.25, 1, 0.5, 1)'}}>
                    {[['partners','Partner Program'],['integrations','Integrations'],['academy','Developer Academy'],['portal','Partner Portal'],['newsletter','Developer Newsletter']].map(([key,label]) => (
                      <button key={key} onClick={()=>{
                        if(key==='portal' && loggedIn){setShowDashboard(true);}
                        else if(key==='newsletter'){setNewsletterModal(true);}
                        else {setActiveSection(key);}
                        setDevToolsOpen(false);
                      }}
                        style={{display:'block',width:'100%',textAlign:'left',padding:'8px 12px',fontSize:13,background:activeSection===key?'var(--surface2)':'none',border:'none',color:key==='portal'?'var(--accent)':'var(--text)',borderRadius:6,cursor:'pointer',fontWeight:key==='portal'?600:400}}
                        onMouseEnter={e=>{ e.currentTarget.style.background='var(--surface2)'; }}
                        onMouseLeave={e=>{ e.currentTarget.style.background=activeSection===key?'var(--surface2)':'none'; }}>
                        {label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button style={{background:'none',border:'1px solid rgba(59,130,246,0.3)',color:'var(--accent)',padding:'6px 14px',borderRadius:8,fontSize:13,display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                <Sparkles size={14}/> Ask AI
              </button>
              <div style={{position:'relative'}}>
                <button onClick={()=>setDevToolsOpen(devToolsOpen==='devtools'?false:'devtools')}
                  style={{background:'none',border:'none',color:'var(--text)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                  Developer Tools <ChevronDown size={14}/>
                </button>
                {devToolsOpen==='devtools' && (
                  <div style={{position:'absolute',top:'100%',right:0,marginTop:8,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:8,minWidth:200,boxShadow:'0 8px 32px rgba(0,0,0,0.5)',animation:'slideDown 0.15s cubic-bezier(0.25, 1, 0.5, 1)'}}>
                    {['SDK Reference','Changelog','Migration Guide','Status Page'].map(item => (
                      <button key={item} onClick={()=>setDevToolsOpen(false)} style={{display:'block',width:'100%',textAlign:'left',padding:'8px 12px',fontSize:13,background:'none',border:'none',color:'var(--text)',borderRadius:6,cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                        onMouseLeave={e=>e.currentTarget.style.background='none'}>
                        {item}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <button style={{background:'none',border:'none',color:'var(--text)',fontSize:13,cursor:'pointer'}}>Community</button>
              <button style={{background:'none',border:'none',color:'var(--text)',fontSize:13,cursor:'pointer'}}>Contact Us</button>
              {!loggedIn ? (
                <button onClick={()=>setLoginModal(true)}
                  style={{background:'none',border:'1px solid var(--border)',color:'var(--text)',padding:'6px 16px',borderRadius:99,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  Sign In
                </button>
              ) : (
                <button onClick={()=>setShowDashboard(true)}

                </div>
                <div style={{marginTop:16}}>
                  <Btn variant="danger" size="sm" onClick={()=>setRotateModal(true)} icon={RotateCcw}>Request New Client Secret</Btn>
                </div>
              </Card>
            );
          })}

          {/* C2C Rotate Modal */}
          {rotateModal && (
            <Modal onClose={()=>setRotateModal(false)} width={480}>
              <div style={{padding:32}}>
                <h3 style={{fontFamily:'DM Sans',fontWeight:700,fontSize:18,marginBottom:16}}>Request Secret Rotation</h3>
                <p style={{color:'var(--muted)',fontSize:14,marginBottom:16}}>Please provide a reason for requesting a new client secret. Our partnerships team will process your request.</p>
                <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Reason for rotation</label>
                <textarea value={rotateReason} onChange={e=>setRotateReason(e.target.value)} rows={4}
                  style={{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:14,outline:'none',resize:'vertical',marginBottom:20}}/>
                <div style={{display:'flex',gap:12,justifyContent:'flex-end'}}>
                  <Btn variant="ghost" onClick={()=>setRotateModal(false)}>Cancel</Btn>
                  <Btn onClick={()=>{setRotateModal(false);setRotateReason('');setToast("Request submitted. You'll receive new credentials within 2 business days.");}}>Submit Request</Btn>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────

    ReactDOM.createRoot(document.getElementById('root')).render(<FrameioDevPortal />);
  </script>
</body>
</html>
